<!-- 


2)შექმენით HTML გვერდი ორი ღილაკით — "გაგზავნა" და "გაუქმება". "გაგზავნა"-ზე დაჭერისას 
setTimeout-ით 3 წამში გამოჩნდეს alert "შეტყობინება გაიგზავნა!". "გაუქმება"-ზე დაჭერისას 
clearTimeout-ით გაუქმდეს და გამოჩნდეს alert "გაუქმდა".
მინიშნება: timeoutID შეინახეთ ცვლადში რომ შემდეგ clearTimeout(timeoutID)-ით გაუქმდეს

3)შექმენით საათის მაგვარი — გვერდზე იყოს <p> ტექსტით "დაელოდეთ...". ღილაკზე დაჭერისას setTimeout-ით 
5 წამში ტექსტი შეიცვალოს "დრო ამოიწურა!"-თ. მეორე ღილაკით კი შეძლოთ "განახლება" — clearTimeout-ით 
გაუქმდეს და <p> დაბრუნდეს "დაელოდეთ..."-ზე.


-->

    3)
    -->

    <p id="time">დაელოდეთ...</p>

    <button id="start">დაწყება</button>

    <button id="reset">განახლება</button>




    <script src="index3.js"></script>


    
</body>
</html>
