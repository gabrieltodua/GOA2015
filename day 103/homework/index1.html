<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index1.css">
</head>
<body>

    <img src="pattern-squiggly-line-bottom-desktop.svg" class="deck1">

    <div class="main">

        <img src="logo-full.svg">

        <h1 class="h1">Your Journey to Coding Conf <br> 2025 Starts Here!</h1>

        <p class="mini">Secure your spot at next year's biggest coding conference.</p>

        <h4 class="hed">Upload Avatar</h4>

        <div class="upload">

            <img src="icon-upload.svg" class="um">

            <p class="mini">Drag and drop or click to upload</p>

            <p class="mini">Upload your photo (JPG or PNG, max size: 500KB).</p>

        </div>

        <div class="all">

            <h4 class="hed">Full Name</h4>
            <input type="text" class="inp_a" placeholder="Full Name" id="name">

        </div>

        <div class="all">
            <h4 class="hed">Email Address</h4>
            <input type="email" placeholder="example@email.com" class="inp_a" id="email">

        </div>

        <div class="all">
            <h4 class="hed">GitHub Username</h4>
            <input type="text" placeholder="example@email.com" class="inp_a" id="git">

        </div>


        <button class="done" dir="done">Generate My Ticket</button>
        <p id="status"></p>

    </div>

    <img src="pattern-squiggly-line-top.svg" class="deck2">

    <script src="index1.js"></script>
</body>
</html>
