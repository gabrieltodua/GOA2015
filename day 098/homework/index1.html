<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index1.css">
</head>
<body>



    <div class="main">

        <h2>Contact Us</h2>

        <div class="input">

            <form class="main_ipt">

                <label class="name_l">First Name *</label>

                <input type="text" class="name">




                <label class="last_l">Last Name *</label>

                <input type="text" class="last">




                <label class="email"></label>

                <input class="Address">Email Address *</label>



                <label class="type">Query Type</label>

                <input type="radio" class="general">
                <label class="general_Enquiry">General Enquiry *</label>

                <input type="radio" class="support">
                <label class="Support_Request">Support Request *</label>

                <label class="message">Message *</label>

                <input type="text" class="message_g">


                <label class="check">I consent to being contacted by the team *</label>

                <input type="radio" class="check_main">

                <input type="submit" class="sub">

            </form>

        </div>

    </div>
    
</body>
