<!-- 
ახსენით რას აკეთებს ქვემოთ მოცემული event-ები დაიხმარეთ w3school 
0) mousedown
1) mouseenter
2) mouseleave
3) mousemove    
4) mouseover
5) შემქენით div. როდესაც ამ div გადავუვლით მაუსით ეს div გაწითლდეს და როდესაც გამოვწევთ მაუს გაყვითლდეს 

-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!-- 
    0) mousedown - ეს event იწარმოება მაშინ, როდესაც მაუსის ღილაკი დაჭერილია.
    1) mouseenter - ეს event იწარმოება მაშინ, როდესაც მაუსი შედის ელემენტზე.
    2) mouseleave - ეს event იწარმოება მაშინ, როდესაც მაუსი ტოვებს ელემენტს.
    3) mousemove - ეს event იწარმოება მაშინ, როდესაც მაუსი მოძრაობს ელემენტზე.
    4) mouseover - ეს event იწარმოება მაშინ, როდესაც მაუსი შედის ელემენტზე ან მის შვილებზე.
    -->

    <div style="width: 200px; height: 200px;background-color: blue;" id="div"></div>


    <script src="index1.js"></script>
    
</body>
</html>
