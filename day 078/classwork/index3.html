4) გადადით ქვემოთ მოცემულ ლინკზე, აირჩიეთ თქვენი სასურველი 2 eventი, ახსენით კომენტარებით რას აკეთებენ ისინი და გამოიყენეთ კოდში

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!-- 
    4)
    -->

    <!-- 
    onpause - ეს event იწარმოება, როდესაც ვიდეო ან აუდიო გაჩერდება. მაგალითად, თუ თქვენ გაქვთ ვიდეო პლეიერი და მომხმარებელი დააწკაპუნებს "pause" ღილაკს, ეს event იწარმოება.
    
    onplaying - ეს event იწარმოება, როდესაც ვიდეო ან აუდიო იწყებს დაკვრას. მაგალითად, თუ თქვენ გაქვთ ვიდეო პლეიერი და მომხმარებელი დააწკაპუნებს "play" ღილაკს, ეს event იწარმოება.
    -->



    <video id="myVideo" width="320" height="240" controls onpause="alert('Video paused!')" onplaying="alert('Video is playing!')">

        <source src="Me at the zoo.mp4" type="video/mp4">

        Your browser does not support the video tag.

    </video>

    <!-- 
    no js
    -->

    <script src="index3.js"></script>
</body>
</html>
