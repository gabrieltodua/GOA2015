<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index1.css">
</head>
<body>

    <h2 class="heder"> S P L I <br> T T E R </h2>


    <div class="main">


        <div class="left">

            <p>bill</p>

            <input type="number" id="money" placeholder="$$$">

            <p>Select tip</p>
            
            <button id="money_five">5%</button>

            <button id="money_ten">10%</button>
        
            <button id="money_fifteen">15%</button><br>
    
            <button id="money_twentyfive">25%</button>

            <button id="money_fifty">50%</button>

            <input type="text" id="money_custom" placeholder="Custom"><br><br><br><br><br><br><br><br>

            <p>number of people</p>

            <input type="number" id = "people" placeholder="people">

            <button id="calculate">Calculate</button>
        </div>



        <div class="right">

            <div class="helper">
            
                <div class="tip">
                    <h4>tip amount</h4>

                    <p class="person">/ person</p>

                    <h1 id="tip">$0.00</h1>
                </div>

                <div class="total">
                    <h4>total</h4>

                    <p class="person">/ person</p>

                    <h1 id="total">$0.00</h1>
                </div>

            </div>

            <button id="reset">Reset</button>
        </div>



    </div>






    <script src="index1.js"></script>
    
</body>
