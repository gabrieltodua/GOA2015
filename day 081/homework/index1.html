1)Fade In/Out — ღილაკი რომელიც elementს opacity-ს 0-დან 1-მდე და პირიქით ცვლის setInterval-ით.
2)მოძრავი ყუთი — div რომელიც მარცხნიდან მარჯვნივ მიდის setInterval + style.left-ით.
3)Counter ანიმაცია — რიცხვი 0-დან 100-მდე ითვლის ეკრანზე setInterval-ით.
4)Shake ეფექტი — ღილაკზე დაჭერით element "ირხევა" — სწრაფად ცვლის style.marginLeft-ს რამდენჯერმე. 


-->
